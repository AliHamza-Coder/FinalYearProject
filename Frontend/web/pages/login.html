<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deceptron — Login</title>
    <link rel="icon" href="../assets/images/Eye icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../vendor/font-awesome/css/all.min.css">
    <script type="text/javascript" src="/eel.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary-blue: #2563eb; /* Professional Royal Blue */
            --accent-cyan: #0ea5e9; /* Sky Blue */
            --bg-main: #0f172a; /* Deep Navy */
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --card-bg: #1e293b; /* Solid Professional Surface */
            --border-subtle: #334155; /* Visible Slate Border */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.05) 0, transparent 50%);
        }

        /* ── BRAND PANEL ── */
        .brand-panel {
            width: 45%;
            min-width: 340px;
            height: 100%;
            background: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            border-right: 1px solid var(--border-subtle);
        }

        /* Subtle grid overlay */
        .brand-panel::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,118,214,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,118,214,0.05) 1px, transparent 1px);
            background-size: 44px 44px;
        }

        /* Radial glow */
        .brand-panel::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 40% 35%, rgba(0,219,255,0.15) 0%, transparent 65%);
        }

        .brand-body {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 3rem 2.5rem;
        }

        .logo-wrap {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            border-radius: 1.5rem;
            padding: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .logo-wrap img {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        .brand-tagline {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: var(--primary-blue);
            text-transform: uppercase;
            margin-bottom: 1.25rem;
            font-weight: 800;
        }

        .brand-divider {
            width: 60px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), transparent);
            margin: 0 auto 1.5rem;
        }

        .brand-desc {
            font-size: 0.82rem;
            color: var(--text-dim);
            line-height: 1.75;
            max-width: 300px;
            margin: 0 auto 2.25rem;
            font-weight: 500;
        }

        .badge-row {
            display: flex;
            gap: 0.6rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.5rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-subtle);
            border-radius: 0.75rem;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Floating dots */
        .dot { position: absolute; border-radius: 50%; animation: pulse 3s ease-in-out infinite; }
        .dot-1 { width: 6px; height: 6px; background: rgba(0,219,255,0.6); top: 18%; left: 15%; }
        .dot-2 { width: 4px; height: 4px; background: rgba(0,118,214,0.7); bottom: 22%; right: 18%; animation-delay: 1.5s; }
        .dot-3 { width: 5px; height: 5px; background: rgba(0,219,255,0.5); top: 65%; left: 8%; animation-delay: 3s; }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.5);opacity:1} }

        /* ── FORM PANEL ── */
        .form-panel {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            background: var(--bg-main);
            overflow-y: auto;
        }

        .form-box {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .form-top {
            text-align: center;
            margin-bottom: 2.25rem;
        }

        .form-top .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.58rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--primary-blue);
            background: rgba(0, 118, 214, 0.08);
            border: 1px solid rgba(0, 118, 214, 0.15);
            padding: 0.4rem 1rem;
            border-radius: 999px;
            margin-bottom: 1.1rem;
        }

        .form-top h2 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .form-top p {
            font-size: 0.78rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Input */
        .field {
            position: relative;
            margin-bottom: 1rem;
        }

        .field-icon {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 48px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            pointer-events: none;
            transition: color 0.25s;
        }

        .field:focus-within .field-icon { color: var(--primary-blue); }

        .field input {
            width: 100%;
            padding: 1rem 2.8rem 1rem 48px;
            background: var(--bg-main);
            border: 1px solid var(--border-subtle);
            border-radius: 0.75rem;
            color: #ffffff;
            font-size: 0.875rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.2s;
        }
        .field input::placeholder { color: var(--text-dim); opacity: 0.5; }
        .field input:focus {
            border-color: var(--primary-blue);
            background: rgba(255, 255, 255, 0.02);
        }
        .eye-btn { position: absolute; right: 4px; top: 12px; bottom: 12px; width: 40px; display: flex; align-items: center; justify-content: center; background: transparent !important; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; transition: color 0.2s; outline: none !important; box-shadow: none !important; -webkit-appearance: none; appearance: none; }
        .eye-btn:hover { color: var(--primary-blue); background: transparent !important; }

        .row-util {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 0.75rem;
            margin: 0.25rem 0 1.75rem;
        }
        .row-util label { display: flex; align-items: center; gap: 0.45rem; color: var(--text-dim); cursor: pointer; font-weight: 500; }
        .row-util label input[type="checkbox"] { accent-color: var(--primary-blue); }
        .row-util a { color: var(--primary-blue); text-decoration: none; font-weight: 600; transition: color .2s; }
        .row-util a:hover { color: var(--accent-cyan); }

        .btn-submit {
            width: 100%;
            padding: 1.15rem;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37, 99, 235, 0.3);
            color: var(--accent-cyan);
            border-radius: 0.75rem;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            gap: 0.65rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .btn-submit:hover {
            background: var(--primary-blue);
            color: #ffffff;
            border-color: var(--primary-blue);
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.5);
            transform: translateY(-2px);
        }

        .btn-submit:active { transform: translateY(0); }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .form-footer {
            margin-top: 1.75rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(0, 118, 214, 0.1);
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-dim);
            font-weight: 500;
        }
        .form-footer a { color: var(--primary-blue); font-weight: 700; text-decoration: none; margin-left: 0.35rem; transition: color 0.2s; }
        .form-footer a:hover { color: var(--accent-cyan); }

        /* Responsive */
        @media (max-width: 820px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .brand-panel { width: 100%; min-height: 300px; height: auto; flex-shrink: 1; border-right: none; border-bottom: 2px solid rgba(0, 219, 255, 0.2); }
            .form-panel { height: auto; overflow-y: visible; padding: 4rem 1.5rem; background: var(--bg-main); }
            .form-box { box-shadow: 0 10px 30px rgba(0, 118, 214, 0.05); }
        }
    </style>
</head>
<body>

    <!-- BRAND PANEL -->
    <div class="brand-panel">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>

        <div class="brand-body">
            <div class="logo-wrap">
                <img src="../assets/images/Logo1.png" alt="Deceptron">
            </div>

            <p class="brand-tagline">Truth Verification System</p>
            <div class="brand-divider"></div>

            <p class="brand-desc">
                Multi-modal deception detection using facial, voice, and behavioral analysis — built for accuracy you can trust.
            </p>

            <div class="badge-row">
                <span class="badge"><i class="fas fa-brain" style="margin-right:5px"></i>Neural</span>
                <span class="badge"><i class="fas fa-microphone-alt" style="margin-right:5px"></i>Voice</span>
                <span class="badge"><i class="fas fa-eye" style="margin-right:5px"></i>Facial</span>
            </div>
        </div>
    </div>

    <!-- FORM PANEL -->
    <div class="form-panel">
        <div class="form-box">
            <div class="form-top">
                <div class="chip"><i class="fas fa-lock"></i> Secure Access</div>
                <h2>Welcome Back</h2>
                <p>Sign in to your account to continue</p>
            </div>

            <form id="loginForm">
                <div class="field">
                    <div class="field-icon"><i class="fas fa-user-shield"></i></div>
                    <input type="text" placeholder="Email or Username" required>
                </div>

                <div class="field">
                    <div class="field-icon"><i class="fas fa-lock"></i></div>
                    <input type="password" id="loginPwd" placeholder="Password" required>
                    <button type="button" class="eye-btn" onclick="togglePwd('loginPwd',this)" tabindex="-1"><i class="fas fa-eye"></i></button>
                </div>

                <div class="row-util">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="form-footer">
                New here?<a href="signup.html">Create an account</a>
            </div>
        </div>
    </div>

    <!-- Backend scripts — untouched -->
    <script src="../js/common/constants.js"></script>
    <script src="../js/common/utils.js"></script>
    <script src="../js/common/api.js"></script>
    <script src="../js/common/auth.js"></script>
    <script src="../js/pages/login.js"></script>
    <script>
        function togglePwd(id, btn) {
            const input = document.getElementById(id);
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            btn.querySelector('i').className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
        }
    </script>
</body>
</html>
